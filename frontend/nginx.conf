server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compresión gzip ───────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        text/xml
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Cabeceras de seguridad ────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"             always;
    add_header X-Content-Type-Options "nosniff"                always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;

    # ── Proxy al backend ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header Connection       "";
        proxy_read_timeout 60s;
        # Buffer de respuesta — evita bloqueos en respuestas grandes (PDF/Excel)
        proxy_buffering on;
        proxy_buffer_size          16k;
        proxy_buffers              8 16k;
        proxy_busy_buffers_size    32k;
    }

    # ── Assets con hash en el nombre (Vite) — cache inmutable 1 año ──────────
    # Vite genera nombres como /assets/Aspirantes-a1b2c3.js
    # El hash garantiza unicidad; immutable le dice al browser que no revalide.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # ── Otros estáticos (imágenes, fuentes, favicon) — cache 30 días ─────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # ── index.html — sin cache (siempre fresco para la SPA) ──────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── React SPA: todas las rutas al index.html ──────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
